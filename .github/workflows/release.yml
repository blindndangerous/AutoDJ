name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write       # gh release create / upload
  id-token: write       # cosign keyless signing

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a release midway

jobs:
  verify-tag:
    name: Verify tag matches CHANGELOG
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - name: Confirm tag has CHANGELOG entry
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          grep -q "^## \[$tag\]" CHANGELOG.md || \
            { echo "::error::Tag $tag has no CHANGELOG entry"; exit 1; }

  build:
    name: Build sdist + wheel
    needs: verify-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with: { enable-cache: true }

      - name: Build artefacts
        run: uv build --sdist --wheel

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  sbom:
    name: Generate SBOM
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.cdx.json

  release:
    name: GitHub release
    needs: [build, sbom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with: { path: ./artefacts }

      - uses: sigstore/cosign-installer@v4

      - name: Sign artefacts (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          shopt -s globstar nullglob
          for f in ./artefacts/dist/*; do
            cosign sign-blob --yes \
              --bundle "${f}.bundle" \
              --output-signature "${f}.sig" \
              "$f"
          done
          for f in ./artefacts/sbom/*; do
            cosign sign-blob --yes \
              --bundle "${f}.bundle" \
              --output-signature "${f}.sig" \
              "$f"
          done

      - name: Extract release notes from CHANGELOG
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          awk "/^## \\[$version\\]/ {flag=1; next} /^## \\[/ {flag=0} flag" CHANGELOG.md > RELEASE_NOTES.md
          [ -s RELEASE_NOTES.md ] || echo "Release $tag" > RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag \
            ./artefacts/dist/* \
            ./artefacts/sbom/* \
            ./artefacts/dist/*.bundle ./artefacts/dist/*.sig \
            ./artefacts/sbom/*.bundle ./artefacts/sbom/*.sig
