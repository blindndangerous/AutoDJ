name: Fuzz

on:
  schedule:
    - cron: '0 4 * * *'   # Every day at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hypothesis-fuzz:
    name: Hypothesis fuzz suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HYPOTHESIS_PROFILE: nightly   # extended example budget
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run fuzz suite
        # Override pyproject addopts with -o so coverage gates (which target
        # the unit-test pass) don't fire on the fuzz-only invocation.
        run: uv run pytest tests/fuzz/ --tb=short -q -o addopts=
