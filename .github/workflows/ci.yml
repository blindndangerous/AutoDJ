name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  id-token: write          # for Codecov OIDC upload (no token needed)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683    # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@22695119d769bdb6f7032ad67b9bca0ef8c4a174   # v6.5.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version-file: pyproject.toml

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff — lint
        run: uv run ruff check src/ tests/

      - name: Ruff — format check
        run: uv run ruff format --check src/ tests/

      - name: Mypy — type check
        run: uv run mypy src/autodj/

      - name: Bandit — security scan
        run: uv run bandit -r src/ -c pyproject.toml

      - name: pip-audit — dependency CVE scan
        run: uv run pip-audit

      - name: Pytest — test suite
        run: uv run pytest --tb=short --cov --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7   # v5.5.1
        with:
          files: coverage.xml
          fail_ci_if_error: false
          use_oidc: true
