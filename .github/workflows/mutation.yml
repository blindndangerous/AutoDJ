name: Mutation testing

on:
  schedule:
    - cron: '0 0 * * 0'   # Sunday 00:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutmut:
    name: mutmut survival rate
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run mutmut
        run: uv run mutmut run --paths-to-mutate src/autodj/ --simple-output
        continue-on-error: true   # report-only; survival rate inspected by hand for now

      - name: Generate report
        if: always()
        run: uv run mutmut results > mutation-report.txt || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: mutation-report.txt
