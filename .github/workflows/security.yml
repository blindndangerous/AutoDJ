name: Security

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 7 * * *"      # 07:00 UTC nightly

permissions:
  contents: read
  security-events: write     # SARIF upload
  actions: read              # codeql-action/upload-sarif on private repos

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy:
    name: Trivy — filesystem CVE scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          exit-code: 1
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy.sarif

  osv-scanner:
    name: OSV-Scanner — multi-ecosystem CVE
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: google/osv-scanner-action/osv-scanner-action@v2
        with:
          # OSV-Scanner v2.x dropped --skip-git; recursive over the working tree is fine.
          scan-args: --recursive ./

  gitleaks:
    name: gitleaks — secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
