name: Security

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 7 * * *"      # 07:00 UTC nightly

permissions:
  contents: read
  security-events: write     # for SARIF upload

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy:
    name: Trivy — filesystem CVE scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683    # v4.2.2
      - uses: aquasecurity/trivy-action@dc5a429b52fcf669ce959baa2c2dd26090d2a6c4   # 0.32.0
        with:
          scan-type: fs
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          exit-code: 1
      - uses: github/codeql-action/upload-sarif@8ec46723261d36a83ea54a0c9f5e54d6926b6d05   # v3.30.10
        if: always()
        with:
          sarif_file: trivy.sarif

  osv-scanner:
    name: OSV-Scanner — multi-ecosystem CVE
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683    # v4.2.2
      - uses: google/osv-scanner-action/osv-scanner-action@e69cc6c86b31f1e7e23935bbe7031b50e51082de   # v2.2.4
        with:
          scan-args: --recursive --skip-git ./

  gitleaks:
    name: gitleaks — secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683    # v4.2.2
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7   # v2.3.9
