repos:
  # Language-agnostic baseline — sanity checks every repo should run.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: detect-private-key
      - id: check-case-conflict
      - id: check-symlinks

  # Secret scanner — same scope, every project.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # GitHub Actions linter — runs on every workflow file.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  # Python toolchain
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff            # lint
        args: [--fix]
      - id: ruff-format     # format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        files: ^src/

  # Conventional Commits enforcement on commit-msg.
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.20.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        args: [--config-file, pyproject.toml]
        files: ^src/
        additional_dependencies:
          - numpy
          - types-requests
          - types-tqdm

  # Dead-code scan -- catches unused module-level functions, classes,
  # imports, and variables that ruff F401/F841 do not flag.
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.16
    hooks:
      - id: vulture
        files: ^src/

  # Dependency declaration auditor -- ensures imports match
  # [project.dependencies] / [project.optional-dependencies].  Catches
  # missing declarations (DEP001), unused declarations (DEP002), and
  # transitive-dep imports that should be made explicit (DEP003).
  # Run via local hook so deptry resolves against the project's own
  # uv env (where pyproject.toml + the dep tree live); the published
  # repo hook does not bundle the project deps for resolution.
  - repo: local
    hooks:
      - id: deptry
        name: deptry
        entry: uv run deptry src/autodj
        language: system
        pass_filenames: false
        files: ^(src/|pyproject\.toml$)

      # JS lint -- vanilla ESLint flat config covering the in-browser
      # ESM modules + the Node-side test / build scripts.  Local hook
      # so it uses the project's pinned eslint from devDependencies.
      - id: eslint
        name: eslint
        entry: npx --no -- eslint
        language: system
        pass_filenames: false
        args: ["src/autodj/static", "tests/jsmodules", "tests/playwright", "vite.config.js", "eslint.config.js"]
        files: \.(js|mjs)$
