coverage:
  status:
    project:
      default:
        # Informational only -- pytest's fail_under in pyproject.toml is
        # the hard gate.  Codecov posts a comment but never blocks the
        # merge, so fork PRs (no CODECOV_TOKEN) and Codecov outages
        # cannot wedge the queue.
        informational: true
        target: auto
        threshold: 1%
    patch:
      default:
        informational: true
        target: 80%

comment:
  layout: "header, diff, files"
  behavior: default
  require_changes: true

# Don't wait for CI before posting -- the upload step only fires
# after pytest passes, so the comment is already accurate.
codecov:
  require_ci_to_pass: false
  notify:
    wait_for_ci: false
